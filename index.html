<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in Cliente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    .logo { display: block; margin: 0 auto 20px; width: 120px; height: auto; }
    h2 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; outline: none; }
    
    /* Estilos da Câmera */
    #camera-container { width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 12px; position: relative; aspect-ratio: 4/3; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #photo-preview { width: 100%; border-radius: 8px; margin-bottom: 12px; display: none; }
    
    .btn-capture { background-color: #6b7280; margin-bottom: 12px; }
    button { width: 100%; padding: 13px; background-color: #4a90e2; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 5px; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="container">
  <img src="imagem.png" alt="Logo" class="logo">
  <h2>Dados do Check-in</h2>

  <input id="vendedor" placeholder="Vendedor" />
  <input id="id_cliente" placeholder="ID do Cliente" />

  <!-- Área da Câmera -->
  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="photo-preview" alt="Sua foto">
  
  <button type="button" class="btn-capture" id="capture-btn">Tirar Foto</button>
  <button onclick="checkin()" id="submit-btn">Fazer Check-in</button>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const preview = document.getElementById('photo-preview');
  const captureBtn = document.getElementById('capture-btn');
  let fotoBase64 = null;

  // Inicia a câmera automaticamente ao carregar
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" }, // Prioriza câmera traseira
        audio: false 
      });
      video.srcObject = stream;
    } catch (err) {
      alert("Erro ao acessar câmera: Verifique as permissões.");
      console.error(err);
    }
  }

  captureBtn.addEventListener('click', () => {
    const context = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    fotoBase64 = canvas.toDataURL('image/jpeg', 0.7); // Retorno em Base64
    preview.src = fotoBase64;
    preview.style.display = 'block';
    document.getElementById('camera-container').style.display = 'none';
    captureBtn.innerText = "Tirar outra foto";
    
    // Se clicar de novo, reseta para tirar outra
    if (preview.style.display === 'block' && captureBtn.dataset.state === 'retake') {
      preview.style.display = 'none';
      document.getElementById('camera-container').style.display = 'block';
      captureBtn.innerText = "Tirar Foto";
      captureBtn.dataset.state = 'capture';
      fotoBase64 = null;
    } else {
      captureBtn.dataset.state = 'retake';
    }
  });

  function checkin() {
    const vendedor = document.getElementById("vendedor").value;
    const id_cliente = document.getElementById("id_cliente").value;
    const btnSubmit = document.getElementById("submit-btn");

    if (!vendedor || !id_cliente || !fotoBase64) {
      alert("Preencha todos os campos e tire a foto!");
      return;
    }

    btnSubmit.disabled = true;
    btnSubmit.innerText = "Enviando...";

    navigator.geolocation.getCurrentPosition(position => {
      const agora = new Date();
      const payload = {
        vendedor: vendedor,
        id_cliente: id_cliente,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        foto: fotoBase64, // A foto vai aqui
        data: agora.toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' }),
        horario: agora.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour12: false }),
        origem: "WEB_GPS_FOTO"
      };

      fetch("https://andresalvi.app.n8n.cloud/webhook-test/check-in", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (response.ok) alert("Check-in e foto enviados!");
        else alert("Erro no servidor.");
      })
      .catch(() => alert("Erro de conexão."))
      .finally(() => {
        btnSubmit.disabled = false;
        btnSubmit.innerText = "Fazer Check-in";
      });
    }, err => alert("Erro GPS: Ative a localização."), { enableHighAccuracy: true });
  }

  initCamera();
</script>
</body>
</html>
