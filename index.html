<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Check-in Cliente</title>
  <style>
  /* Reset e Configurações de Tela */
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
}

body { 
  background-color: #f0f2f5; 
  display: flex; 
  flex-direction: column; /* Alinha container e footer verticalmente */
  justify-content: center; 
  align-items: center; 
  min-height: 100vh; 
  padding: 20px;
  position: relative;
}

/* Container central */
.container {
  background-color: #ffffff;
  padding: 30px 25px;
  border-radius: 4px; /* Arredondamento reduzido */
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  width: 100%;
  max-width: 400px;
  text-align: center;
  z-index: 1;
}

.logo { 
  width: 120px; 
  margin-bottom: 20px; 
  height: auto; 
}

h2 { 
  font-size: 1.3rem; 
  color: #1a1a2e; 
  margin-bottom: 20px; 
  font-weight: 600;
}

/* Labels discretas */
label { 
  display: block; 
  text-align: left; 
  font-size: 0.8rem; 
  color: #666; 
  margin-bottom: 4px; 
  margin-left: 2px;
}

/* Campos de entrada e seleção */
input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 1px solid #d1d5db;
  border-radius: 4px; /* Arredondamento reduzido */
  font-size: 16px; /* Impede zoom no mobile */
  background-color: #fafafa;
  color: #333;
  outline: none;
  appearance: none; /* Remove estilo padrão do navegador */
  transition: border-color 0.2s;
}

/* Foco nos campos com Azul Marinho */
input:focus, select:focus {
  border-color: #00008B;
  box-shadow: 0 0 0 1px #00008B;
}

/* Estilo do Dropdown (Seta customizada) */
select {
  background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org" width="20" height="20" viewBox="0 0 20 20"><path fill="%2300008B" d="M7 7l3-3 3 3m0 6l-3 3-3-3"/></svg>');
  background-repeat: no-repeat;
  background-position: right 12px center;
  cursor: pointer;
}

select:disabled {
  background-color: #eeeeee;
  cursor: not-allowed;
  opacity: 0.7;
}

/* Área da Câmera */
#camera-wrapper {
  width: 100%;
  background: #000;
  border-radius: 4px; /* Arredondamento reduzido */
  overflow: hidden;
  margin-bottom: 15px;
  position: relative;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #d1d5db;
}

video, #photo-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#photo-preview { 
  display: none; 
}

/* Botões */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 4px; /* Arredondamento reduzido */
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s, transform 0.1s;
}

/* Botão Secundário (Tirar Foto) */
.btn-capture { 
  background-color: #4b5563; 
  color: white; 
  margin-bottom: 10px; 
}

.btn-capture:hover {
  background-color: #374151;
}

/* Botão Principal (Azul Marinho) */
.btn-submit { 
  background-color: #00008B; 
  color: white; 
}

.btn-submit:hover {
  background-color: #000066;
}

button:disabled { 
  background-color: #cbd5e1; 
  cursor: not-allowed; 
}

button:active { 
  transform: scale(0.98); 
}

/* Footer discreto */
.dev-footer {
  margin-top: 20px;
  font-size: 0.65rem;
  color: #9ca3af;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Responsividade para telas muito pequenas */
@media (max-width: 400px) {
  .container { 
    padding: 20px 15px; 
  }
  h2 {
    font-size: 1.1rem;
  }
}
  </style>
</head>
<body>

<div class="container">
  <img src="imagem.png" alt="Logo" class="logo">
  <h2>Check-in de Visita</h2>

  <input id="vendedor" type="text" placeholder="Nome do Vendedor">
  
  <label>Rota:</label>
  <select id="select_rota" onchange="atualizarClientes()">
    <option value="">Carregando rotas...</option>
  </select>

  <label>Cliente:</label>
  <select id="id_cliente" disabled>
    <option value="">Selecione a rota primeiro</option>
  </select>

  <div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <img id="photo-preview">
  </div>
  
  <button type="button" class="btn-capture" id="capture-btn">📸 Tirar Foto</button>
  <button onclick="checkin()" class="btn-submit" id="submit-btn" style="margin-top:10px">Finalizar Check-in</button>
</div>
<footer class="dev-footer">
    Desenvolvido por André Salvi
</footer>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbyYXOW9rpUp-5m7bKKciiePr5RXhYdELswu44FXABPYCq2MDhBoOzPl_cve6g6CGB1A/exec"; // <--- COLOQUE A NOVA URL AQUI
  const video = document.getElementById('video');
  const preview = document.getElementById('photo-preview');
  const captureBtn = document.getElementById('capture-btn');
  const selectRota = document.getElementById('select_rota');
  const selectCliente = document.getElementById('id_cliente');
  let dadosGerais = {};
  let fotoBase64 = null;

  async function carregarDados() {
    try {
      const response = await fetch(scriptURL);
      dadosGerais = await response.json();
      selectRota.innerHTML = '<option value="">Selecione a Rota</option>';
      Object.keys(dadosGerais).sort().forEach(rota => {
        let opt = document.createElement('option');
        opt.value = rota; opt.innerHTML = rota;
        selectRota.appendChild(opt);
      });
    } catch (e) {
      selectRota.innerHTML = '<option value="">Erro ao carregar</option>';
    }
  }

  function atualizarClientes() {
    const rota = selectRota.value;
    selectCliente.innerHTML = '<option value="">Selecione o Cliente</option>';
    if (rota && dadosGerais[rota]) {
      selectCliente.disabled = false;
      dadosGerais[rota].sort().forEach(c => {
        let opt = document.createElement('option');
        opt.value = c; opt.innerHTML = c;
        selectCliente.appendChild(opt);
      });
    } else {
      selectCliente.disabled = true;
    }
  }

  async function startCamera() {
    try {
      video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    } catch (err) { alert("Câmera indisponível"); }
  }

  captureBtn.addEventListener('click', () => {
    if (fotoBase64) {
      fotoBase64 = null; preview.style.display = 'none'; video.style.display = 'block';
      captureBtn.innerText = "📸 Tirar Foto";
      return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    fotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
    preview.src = fotoBase64; preview.style.display = 'block'; video.style.display = 'none';
    captureBtn.innerText = "🔄 Tirar Outra";
  });

  async function checkin() {
    const v = document.getElementById('vendedor').value;
    const r = selectRota.value;
    const c = selectCliente.value;
    if (!v || !r || !c || !fotoBase64) return alert("Preencha tudo!");

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.innerText = "Enviando...";

    navigator.geolocation.getCurrentPosition(async pos => {
      const payload = { vendedor: v, rota: r, id_cliente: c, latitude: pos.coords.latitude, longitude: pos.coords.longitude, foto: fotoBase64, data: new Date().toLocaleDateString('sv-SE'), horario: new Date().toLocaleTimeString('pt-BR') };
      try {
        await fetch(scriptURL, { method: "POST", body: JSON.stringify(payload), mode: 'no-cors' });
        alert("✅ Sucesso!"); location.reload();
      } catch (e) { alert("Erro ao enviar"); btn.disabled = false; }
    }, () => { alert("GPS necessário"); btn.disabled = false; });
  }

  window.onload = () => { carregarDados(); startCamera(); };
</script>
</body>
</html>
