<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Check-in Cliente</title>
  <!-- SlimSelect CORRIGIDO -->
  <link href="https://unpkg.com" rel="stylesheet">
  <script src="https://unpkg.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { background-color: #ffffff; padding: 30px 25px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
    .logo { width: 120px; margin-bottom: 20px; }
    h2 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 20px; }
    label { display: block; text-align: left; font-size: 0.8rem; color: #666; margin-bottom: 4px; }
    .ss-main { margin-bottom: 15px; text-align: left; border-radius: 4px; } 
    #camera-wrapper { width: 100%; background: #000; border-radius: 4px; overflow: hidden; margin-bottom: 15px; aspect-ratio: 4/3; display: flex; border: 1px solid #d1d5db; }
    video, #photo-preview { width: 100%; height: 100%; object-fit: cover; }
    #photo-preview { display: none; }
    button { width: 100%; padding: 15px; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-capture { background-color: #4b5563; color: white; margin-bottom: 10px; }
    .btn-submit { background-color: #00008B; color: white; }
    .dev-footer { margin-top: 20px; font-size: 0.65rem; color: #9ca3af; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <img src="imagem.png" alt="Logo" class="logo">
  <h2>Check-in de Visita</h2>

  <label>Vendedor:</label>
  <select id="select_vendedor"><option data-placeholder="true">Carregando vendedores...</option></select>
  
  <label>Rota:</label>
  <select id="select_rota"><option data-placeholder="true">Aguardando Vendedor...</option></select>

  <label>Cliente:</label>
  <select id="id_cliente"><option data-placeholder="true">Aguardando Rota...</option></select>

  <div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <img id="photo-preview">
  </div>
  
  <button type="button" class="btn-capture" id="capture-btn">📸 Tirar Foto</button>
  <button onclick="checkin()" class="btn-submit" id="submit-btn" style="margin-top:10px">Finalizar Check-in</button>
</div>

<footer class="dev-footer">Desenvolvido por André Salvi</footer>

<script>
  // COLE AQUI SUA URL DE DEPLOY DO GOOGLE
  const googleScriptURL = "https://script.google.com/macros/s/AKfycbyYXOW9rpUp-5m7bKKciiePr5RXhYdELswu44FXABPYCq2MDhBoOzPl_cve6g6CGB1A/exec";
  const n8nWebhookURL = "https://andresalvi.app.n8n.cloud/webhook/check-in";

  let dadosGerais = {};
  let fotoBase64 = null;
  let ssVendedor, ssRota, ssCliente;

  function initSlimSelect() {
    ssVendedor = new SlimSelect({ 
      select: '#select_vendedor', 
      events: { afterChange: () => atualizarRotas() } 
    });
    ssRota = new SlimSelect({ 
      select: '#select_rota', 
      events: { afterChange: () => atualizarClientes() } 
    });
    ssCliente = new SlimSelect({ select: '#id_cliente' });
  }

  async function carregarDados() {
    try {
      const response = await fetch(googleScriptURL);
      dadosGerais = await response.json();
      const vendedores = Object.keys(dadosGerais).sort().map(v => ({text: v, value: v}));
      ssVendedor.setData([{text: 'Selecione o Vendedor', placeholder: true}, ...vendedores]);
    } catch (e) { 
      console.error(e);
      alert("Erro ao carregar dados. Verifique a URL do Script."); 
    }
  }

  function atualizarRotas() {
    const v = document.getElementById('select_vendedor').value;
    const rotasArr = (v && dadosGerais[v]) ? Object.keys(dadosGerais[v]).sort() : [];
    const options = rotasArr.map(r => ({text: r, value: r}));
    ssRota.setData([{text: 'Selecione a Rota', placeholder: true}, ...options]);
    ssCliente.setData([{text: 'Aguardando Rota...', placeholder: true}]);
  }

  function atualizarClientes() {
    const v = document.getElementById('select_vendedor').value;
    const r = document.getElementById('select_rota').value;
    const clientesArr = (v && r && dadosGerais[v][r]) ? dadosGerais[v][r].sort() : [];
    const options = clientesArr.map(c => ({text: c, value: c}));
    ssCliente.setData([{text: 'Selecione o Cliente', placeholder: true}, ...options]);
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      document.getElementById('video').srcObject = stream;
    } catch (err) { alert("Câmera não detectada ou permissão negada."); }
  }

  document.getElementById('capture-btn').addEventListener('click', () => {
    const video = document.getElementById('video');
    const preview = document.getElementById('photo-preview');
    const btn = document.getElementById('capture-btn');
    if (fotoBase64) {
      fotoBase64 = null; preview.style.display = 'none'; video.style.display = 'block';
      btn.innerText = "📸 Tirar Foto";
      return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    fotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
    preview.src = fotoBase64; preview.style.display = 'block'; video.style.display = 'none';
    btn.innerText = "🔄 Tirar Outra";
  });

  async function checkin() {
    const v = document.getElementById('select_vendedor').value;
    const r = document.getElementById('select_rota').value;
    const c = document.getElementById('id_cliente').value;
    const btn = document.getElementById('submit-btn');

    if (!v || !r || !c || !fotoBase64) return alert("Preencha todos os campos e tire a foto!");
    btn.disabled = true; btn.innerText = "Enviando...";

    navigator.geolocation.getCurrentPosition(async pos => {
      const payload = { 
        vendedor: v, rota: r, cliente: c, 
        latitude: pos.coords.latitude, longitude: pos.coords.longitude, 
        foto: fotoBase64, data: new Date().toLocaleDateString('sv-SE'), 
        horario: new Date().toLocaleTimeString('pt-BR') 
      };
      try {
        const res = await fetch(n8nWebhookURL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (res.ok) { alert("✅ Check-in realizado!"); location.reload(); }
        else { throw new Error(); }
      } catch (e) { alert("Erro ao enviar para o servidor."); btn.disabled = false; btn.innerText = "Finalizar Check-in"; }
    }, () => { alert("GPS obrigatório."); btn.disabled = false; btn.innerText = "Finalizar Check-in"; }, { enableHighAccuracy: true });
  }

  window.onload = () => { initSlimSelect(); carregarDados(); startCamera(); };
</script>
</body>
</html>
