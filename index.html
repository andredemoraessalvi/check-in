<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in Cliente</title>
  <style>
  /* Reset e configuração geral da página */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* Container central do formulário */
  .container {
    background-color: #ffffff;
    padding: 40px 36px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  /* Logo/Imagem PNG no topo */
  .logo {
    display: block;
    margin: 0 auto 24px auto;
    width: 140px;       /* Ajuste conforme o tamanho da sua imagem */
    height: auto;
  }

  /* Título h2 */
  h2 {
    font-size: 1.4rem;
    color: #1a1a2e;
    margin-bottom: 24px;
    font-weight: 600;
  }

  /* Campos de input */
  input {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #333;
    background-color: #fafafa;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: #4a90e2;
    box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    background-color: #fff;
  }

  input::placeholder {
    color: #9ca3af;
  }

  /* Botão */
  button {
    width: 100%;
    padding: 13px;
    background-color: #4a90e2;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  button:hover {
    background-color: #357abd;
  }

  button:active {
    transform: scale(0.98);
  }

  /* Responsividade para telas pequenas */
  @media (max-width: 480px) {
    .container {
      margin: 16px;
      padding: 28px 20px;
    }
  }
  </style>
</head>
<body>
  <div class="container">
    <img src="imagem.png" alt="Logo" class="logo">
    <h2>Dados do Check-in</h2>
  
    <input id="vendedor" placeholder="Vendedor" /><br><br>
    <input id="id_cliente" placeholder="ID do Cliente" /><br><br>
  
    <button onclick="checkin()">Fazer Check-in</button>
  
    <script>
      function checkin() {
        // 1. Verifica se os campos estão preenchidos antes de pedir o GPS
        const vendedor = document.getElementById("vendedor").value;
        const id_cliente = document.getElementById("id_cliente").value;
  
        if (!vendedor || !id_cliente) {
          alert("Por favor, preencha o vendedor e o ID do cliente.");
          return;
        }
  
        if (!navigator.geolocation) {
          alert("Geolocalização não suportada pelo seu navegador.");
          return;
        }
  
        // 2. Solicita a posição
        navigator.geolocation.getCurrentPosition(
          position => {
            // Lógica para data e hora (UTC-3)
            const agora = new Date();
            const dataSP = agora.toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' });
            const horaSP = agora.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour12: false });
  
            const payload = {
              vendedor: vendedor,
              id_cliente: id_cliente,
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              data: dataSP,
              horario: horaSP,
              origem: "WEB_GPS"
            };
  
            // 3. Envio para o n8n
            fetch("https://andresalvi.app.n8n.cloud/webhook-test/check-in", { // <-- Use /webhook-test/ para testar!
              method: "POST",
              headers: { 
                "Content-Type": "application/json" 
              },
              body: JSON.stringify(payload)
            })
            .then(async response => {
              if (response.ok) {
                alert("Check-in enviado com sucesso!");
              } else {
                const textoErro = await response.text();
                console.error("Erro do n8n:", textoErro);
                alert("O n8n recebeu, mas retornou erro: " + response.status);
              }
            })
            .catch(err => {
              console.error("Erro de Rede/CORS:", err);
              alert("Erro ao conectar com o n8n. Verifique o console (F12).");
            });
          },
          err => {
            const mensagens = {
              1: "Permissão de localização negada pelo usuário.",
              2: "Posição indisponível.",
              3: "Tempo esgotado ao obter localização."
            };
            alert("Erro GPS: " + (mensagens[err.code] || err.message));
          },
          { 
            enableHighAccuracy: true, 
            timeout: 10000 // 10 segundos de limite
          }
        );
      }
  </script>
  </div>
</body>
</html>
