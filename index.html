<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Check-in Cliente</title>
  <link href="https://unpkg.com" rel="stylesheet">
  <script src="https://unpkg.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f0f2f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { background-color: #ffffff; padding: 30px 25px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
    .logo { width: 120px; margin-bottom: 20px; }
    h2 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 20px; }
    label { display: block; text-align: left; font-size: 0.8rem; color: #666; margin-bottom: 4px; }
    .ss-main { margin-bottom: 15px; text-align: left; border-radius: 4px; } 
    #camera-wrapper { width: 100%; background: #000; border-radius: 4px; overflow: hidden; margin-bottom: 15px; aspect-ratio: 4/3; display: flex; border: 1px solid #d1d5db; }
    video, #photo-preview { width: 100%; height: 100%; object-fit: cover; }
    #photo-preview { display: none; }
    button { width: 100%; padding: 15px; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-capture { background-color: #4b5563; color: white; margin-bottom: 10px; }
    .btn-submit { background-color: #00008B; color: white; }
    .dev-footer { margin-top: 20px; font-size: 0.65rem; color: #9ca3af; text-transform: uppercase; }
    .autocomplete-wrapper { position: relative; width: 100%; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #d1d5db; border-top: none; border-radius: 0 0 4px 4px; max-height: 180px; overflow-y: auto; z-index: 100; list-style: none; margin-top: -15px; display: none; }
    .autocomplete-list li { padding: 10px 14px; font-size: 0.95rem; cursor: pointer; color: #333; }
    .autocomplete-list li:hover, .autocomplete-list li.active { background-color: #e8eaf6; }
  </style>
</head>
<body>

<div class="container">
  <img src="imagem.png" alt="Logo" class="logo">
  <h2>Check-in de Visita</h2>

  <label>Vendedor:</label>
  <div class="autocomplete-wrapper">
    <input id="vendedor" type="text" placeholder="Digite ou selecione o vendedor" autocomplete="off" oninput="filtrarOpcoes('vendedor')" onfocus="abrirLista('vendedor')" onblur="fecharLista('vendedor')">
    <ul id="vendedor-list" class="autocomplete-list"></ul>
  </div>

  <label>Rota:</label>
  <div class="autocomplete-wrapper">
    <input id="select_rota" type="text" placeholder="Selecione o vendedor primeiro" autocomplete="off" disabled oninput="filtrarOpcoes('select_rota')" onfocus="abrirLista('select_rota')" onblur="fecharLista('select_rota')">
    <ul id="select_rota-list" class="autocomplete-list"></ul>
  </div>

  <label>Cliente:</label>
  <div class="autocomplete-wrapper">
    <input id="id_cliente" type="text" placeholder="Selecione a rota primeiro" autocomplete="off" disabled oninput="filtrarOpcoes('id_cliente')" onfocus="abrirLista('id_cliente')" onblur="fecharLista('id_cliente')">
    <ul id="id_cliente-list" class="autocomplete-list"></ul>
  </div>

  <div id="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <img id="photo-preview">
  </div>
  
  <button type="button" class="btn-capture" id="capture-btn">📸 Tirar Foto</button>
  <button onclick="checkin()" class="btn-submit" id="submit-btn" style="margin-top:10px">Finalizar Check-in</button>
</div>

<footer class="dev-footer">Desenvolvido por André Salvi</footer>

<script>
  const googleScriptURL = "https://script.google.com/macros/s/AKfycbyYXOW9rpUp-5m7bKKciiePr5RXhYdELswu44FXABPYCq2MDhBoOzPl_cve6g6CGB1A/exec";
  const n8nWebhookURL = "https://andresalvi.app.n8n.cloud/webhook/check-in";

  const video = document.getElementById('video');
  const preview = document.getElementById('photo-preview');
  const captureBtn = document.getElementById('capture-btn');
  const cameraError = document.getElementById('camera-error');
  const submitBtn = document.getElementById('submit-btn');

  let dadosGerais = {};
  let fotoBase64 = null;
  let gpsBloqueado = false;

  // --- Autocomplete Engine ---

  const opcoesDisponiveis = { vendedor: [], select_rota: [], id_cliente: [] };
  const valoresSelecionados = { vendedor: null, select_rota: null, id_cliente: null };

  function popularLista(id, opcoes) {
    opcoesDisponiveis[id] = opcoes;
    const input = document.getElementById(id);
    input.value = '';
    input.disabled = opcoes.length === 0;
    input.placeholder = opcoes.length === 0
      ? (id === 'select_rota' ? 'Selecione o vendedor primeiro' : id === 'id_cliente' ? 'Selecione a rota primeiro' : 'Carregando...')
      : (id === 'vendedor' ? 'Digite ou selecione o vendedor' : id === 'select_rota' ? 'Digite ou selecione a rota' : 'Digite ou selecione o cliente');
    valoresSelecionados[id] = null;
    renderizarLista(id, opcoes);
  }

  function renderizarLista(id, opcoes) {
    const lista = document.getElementById(id + '-list');
    lista.innerHTML = '';
    opcoes.forEach(op => {
      const li = document.createElement('li');
      li.textContent = op;
      li.addEventListener('mousedown', () => selecionarOpcao(id, op));
      lista.appendChild(li);
    });
  }

  function filtrarOpcoes(id) {
    const input = document.getElementById(id);
    const termo = input.value.toLowerCase();
    const filtradas = opcoesDisponiveis[id].filter(o => o.toLowerCase().includes(termo));
    renderizarLista(id, filtradas);
    abrirLista(id);
    valoresSelecionados[id] = null;

    // Limpa dependentes ao digitar
    if (id === 'vendedor') {
      popularLista('select_rota', []);
      popularLista('id_cliente', []);
    } else if (id === 'select_rota') {
      popularLista('id_cliente', []);
    }
  }

  function abrirLista(id) {
    const lista = document.getElementById(id + '-list');
    if (opcoesDisponiveis[id].length > 0) lista.style.display = 'block';
  }

  function fecharLista(id) {
    setTimeout(() => {
      document.getElementById(id + '-list').style.display = 'none';
      // Se o usuário saiu sem selecionar, restaura valor anterior ou limpa
      const input = document.getElementById(id);
      if (!valoresSelecionados[id]) input.value = '';
    }, 150);
  }

  function selecionarOpcao(id, valor) {
    document.getElementById(id).value = valor;
    document.getElementById(id + '-list').style.display = 'none';
    valoresSelecionados[id] = valor;

    if (id === 'vendedor') {
      const rotas = Object.keys(dadosGerais[valor] || {}).sort();
      popularLista('select_rota', rotas);
      popularLista('id_cliente', []);
    } else if (id === 'select_rota') {
      const vendedor = valoresSelecionados['vendedor'];
      const clientes = (dadosGerais[vendedor] && dadosGerais[vendedor][valor])
        ? [...dadosGerais[vendedor][valor]].sort()
        : [];
      popularLista('id_cliente', clientes);
    }
  }

  // --- Carregar dados ---

  async function carregarDados() {
    try {
      const response = await fetch(googleScriptURL);
      dadosGerais = await response.json();
      const vendedores = Object.keys(dadosGerais).sort();
      popularLista('vendedor', vendedores);
    } catch (e) {
      document.getElementById('vendedor').placeholder = 'Erro ao carregar';
    }
  }

  // --- Câmera ---

  async function startCamera() {
    cameraError.style.display = 'none';
    video.style.display = 'block';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = stream;
    } catch (err) {
      video.style.display = 'none';
      cameraError.style.display = 'block';
    }
  }

  captureBtn.addEventListener('click', () => {
    if (fotoBase64) {
      fotoBase64 = null; preview.style.display = 'none'; video.style.display = 'block';
      captureBtn.innerText = "📸 Tirar Foto";
      return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    fotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
    preview.src = fotoBase64; preview.style.display = 'block'; video.style.display = 'none';
    captureBtn.innerText = "🔄 Tirar Outra";
  });

  // --- Check-in ---

  async function checkin() {
    const v = valoresSelecionados['vendedor'];
    const r = valoresSelecionados['select_rota'];
    const c = valoresSelecionados['id_cliente'];

    if (!v || !r || !c || !fotoBase64) return alert("Preencha tudo e tire a foto!");

    if (gpsBloqueado) {
      submitBtn.classList.remove('btn-gps-error');
      submitBtn.innerText = "Tentando GPS...";
    } else {
      submitBtn.disabled = true;
      submitBtn.innerText = "Enviando...";
    }

    navigator.geolocation.getCurrentPosition(async pos => {
      gpsBloqueado = false;
      const payload = {
        vendedor: v, rota: r, cliente: c,
        latitude: pos.coords.latitude, longitude: pos.coords.longitude,
        foto: fotoBase64, data: new Date().toLocaleDateString('sv-SE'),
        horario: new Date().toLocaleTimeString('pt-BR'), origem: "WEBAPP_DIRECT"
      };
      try {
        const response = await fetch(n8nWebhookURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (response.ok) {
          alert("✅ Check-in enviado com sucesso!");
          location.reload();
        } else { throw new Error(); }
      } catch (e) {
        alert("Erro ao conectar com n8n.");
        submitBtn.disabled = false; submitBtn.innerText = "Finalizar Check-in";
      }
    }, (err) => {
      gpsBloqueado = true;
      submitBtn.disabled = false;
      submitBtn.innerText = "📍 Liberar GPS no Cadeado";
      submitBtn.classList.add('btn-gps-error');
      alert("GPS Bloqueado! 📍\nClique no cadeado da URL, permita a 'Localização' e clique no botão vermelho para tentar de novo.");
    }, { enableHighAccuracy: true, timeout: 10000 });
  }

  window.onload = () => { carregarDados(); startCamera(); };
</script>
</body>
</html>
